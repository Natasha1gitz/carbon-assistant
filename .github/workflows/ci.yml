name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Quality: TypeCheck + Lint + Format + Test + Build
  # ===========================================================================
  quality:
    name: Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (strict mode)
        run: npx tsc --noEmit

      - name: Lint (ESLint + jsx-a11y accessibility rules)
        run: npm run lint

      - name: Format check (Prettier)
        run: npx prettier --check .

      - name: Unused exports check (Knip)
        run: npm run knip

      - name: Unit + accessibility tests with coverage
        run: npx vitest run --coverage

      - name: Production build (Turbopack)
        run: npm run build

      - name: Lighthouse CI (Performance & A11y)
        run: npm run lhci

  # ===========================================================================
  # Docker: Build + Health Check
  # ===========================================================================
  docker-build:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag carbon-assistant:${{ github.sha }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

      - name: Start container and verify health
        run: |
          docker run -d \
            --name carbon-test \
            -p 3000:3000 \
            carbon-assistant:${{ github.sha }}

          echo "Waiting for app to start..."
          timeout 60 bash -c '
            until curl -sf http://localhost:3000/; do
              sleep 2
            done
          '
          echo "Health check passed!"

      - name: Clean up container
        if: always()
        run: docker stop carbon-test || true
